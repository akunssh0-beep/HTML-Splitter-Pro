<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Splitter Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div class="app-bar">
        <h1>HTML Splitter Pro</h1>
    </div>

    <div class="container">
        <div class="card">
            <div class="icon-header">📦</div>
            <h2>Dekonstruksi Kode</h2>
            <p>Unggah file HTML tunggal untuk dipisahkan menjadi struktur folder CSS & JS dalam .ZIP</p>
            
            <div class="upload-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".html" hidden>
                <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                    PILIH FILE HTML
                </button>
                <p id="fileNameDisplay" class="file-name">Belum ada file terpilih</p>
            </div>

            <button id="processBtn" class="btn-action" disabled>PROSES SEKARANG</button>
        </div>

        <div id="statusSection" class="status-card" style="display: none;">
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText">Menyiapkan...</p>
        </div>

        <div id="resultArea" style="display: none;">
            <div class="success-banner">✨ Berhasil Dipisahkan!</div>
            <button id="downloadZipBtn" class="btn-zip">
                🎁 UNDUH PROJECT (.ZIP)
            </button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
